<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Register | CipherLink</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>CipherLink</h1>

            <p class="subtitle">
                Create your secure communication account
            </p>

            {% with messages =
                get_flashed_messages(with_categories=true)
            %}

                {% for category, message in messages %}

                    <div class="alert {{ category }}">
                        {{ message }}
                    </div>

                {% endfor %}

            {% endwith %}

            <form method="POST">

                <label for="username">
                    Username
                </label>

                <input
                    id="username"
                    name="username"
                    type="text"
                    placeholder="Choose a username"
                    autocomplete="username"
                    required
                >

                <label for="password">
                    Password
                </label>

                <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="Minimum 8 characters"
                    autocomplete="new-password"
                    required
                >

                <label for="confirm_password">
                    Confirm password
                </label>

                <input
                    id="confirm_password"
                    name="confirm_password"
                    type="password"
                    placeholder="Enter your password again"
                    autocomplete="new-password"
                    required
                >

                <button type="submit">
                    Create Account
                </button>

            </form>

            <p class="auth-link">

                Already have an account?

                <a href="{{ url_for('login') }}">
                    Log in
                </a>

            </p>

        </div>

    </div>

</body>

</html>
